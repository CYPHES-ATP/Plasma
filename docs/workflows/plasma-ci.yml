name: Plasma CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: plasma-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun typecheck

      - name: Plasma security tests
        run: bun --cwd packages/opencode test test/plasma/plasma.test.ts

      - name: App unit tests
        run: bun --cwd packages/app test:unit

      - name: Build web application
        run: bun --cwd packages/app build

      - name: Build desktop application
        run: bun --cwd packages/desktop build

      - name: Build and smoke-test Plasma CLI
        run: bun run --cwd packages/opencode script/build.ts --single --skip-install

      - name: Verify installer syntax
        run: bash -n install
