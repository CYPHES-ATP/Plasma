name: Plasma Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset_ext: tar.gz
          - runner: macos-14
            asset_ext: zip
          - runner: windows-2025
            asset_ext: zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native Plasma CLI
        shell: bash
        run: bun run --cwd packages/opencode script/build.ts --single --skip-install

      - name: Package Unix asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          artifact="$(find packages/opencode/dist -mindepth 1 -maxdepth 1 -type d -name 'plasma-*' | head -n 1)"
          name="$(basename "$artifact")"
          if [ "${{ matrix.asset_ext }}" = "tar.gz" ]; then
            tar -czf "release/${name}.tar.gz" -C "${artifact}/bin" .
          else
            (cd "${artifact}/bin" && zip -r "${GITHUB_WORKSPACE}/release/${name}.zip" .)
          fi

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $artifact = Get-ChildItem packages/opencode/dist -Directory -Filter "plasma-*" | Select-Object -First 1
          Compress-Archive -Path "$($artifact.FullName)/bin/*" -DestinationPath "release/$($artifact.Name).zip" -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: plasma-cli-${{ runner.os }}-${{ runner.arch }}
          path: release/*
          if-no-files-found: error

  desktop-macos:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      OPENCODE_CHANNEL: prod
    steps:
      - name: Require Apple signing credentials
        shell: bash
        run: |
          require_secret() {
            if [ -z "${!1}" ]; then
              echo "::error::Required release secret $1 is not configured."
              exit 1
            fi
          }
          require_secret CSC_LINK
          require_secret CSC_KEY_PASSWORD
          require_secret APPLE_ID
          require_secret APPLE_APP_SPECIFIC_PASSWORD
          require_secret APPLE_TEAM_ID

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop application
        run: bun --cwd packages/desktop build

      - name: Package, sign, and notarize macOS application
        run: bun --cwd packages/desktop package:mac

      - name: Verify signed application
        shell: bash
        run: |
          app="$(find packages/desktop/dist -maxdepth 2 -name 'Plasma.app' -type d | head -n 1)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plasma-desktop-macos
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli, desktop-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: plasma-*
          path: release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
