name: Feature request
description: Propose a focused improvement to Plasma
title: "[Feature]: "
body:
  - type: checkboxes
    id: searched
    attributes:
      label: Existing requests
      options:
        - label: I searched existing issues and did not find this request.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Solidity development or security problem should Plasma solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful workflow and its expected result.
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security and deployment-gate impact
      description: Explain whether this changes compilation, audit validity, fingerprints, signing, or deployment enforcement.
    validations:
      required: false
