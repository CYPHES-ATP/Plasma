name: Question
description: Ask about installing, configuring, or using Plasma
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Do not include private keys, seed phrases, API keys, wallet exports, or production credentials.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Include the Plasma version, operating system, and relevant command when applicable.
    validations:
      required: true
